name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  ci:
    name: CI
    uses: ./.github/workflows/ci.yaml
    permissions:
      contents: read

  release:
    name: Build & Release
    needs: [ci]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Restore Go module cache
        uses: actions/cache@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: go-${{ runner.os }}-${{ hashFiles('go.sum') }}
          restore-keys: go-${{ runner.os }}-

      - uses: jdx/mise-action@v2
        with:
          install: true
          reshim: true

      - name: Build and compress linux-amd64 binary
        run: make compress GOOS=linux GOARCH=amd64 VERSION=${{ github.ref_name }}

      - name: Extract changelog for this release
        id: changelog
        run: |
          tag="${{ github.ref_name }}"
          version="${tag#v}"
          # Extract the section between this version's header and the next version header.
          # Falls back to the Unreleased section if the exact version isn't found.
          notes=$(awk -v ver="$version" '
            /^## \[/ {
              if (found) exit
              if ($0 ~ "\\[" ver "\\]" || (ver == "" && $0 ~ "\\[Unreleased\\]")) found=1
              next
            }
            found { print }
          ' CHANGELOG.md)
          # Write to step output using heredoc delimiter.
          {
            echo "notes<<CHANGELOG_EOF"
            echo "$notes"
            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.changelog.outputs.notes }}
          files: dist/*
          generate_release_notes: false

      - name: Decompress binary for Docker image
        run: gunzip -k dist/gke-cost-analyzer-linux-amd64.gz

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ github.ref_name }}
            ghcr.io/${{ github.repository }}:latest
