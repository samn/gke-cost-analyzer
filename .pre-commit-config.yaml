repos:
  - repo: builtin
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-merge-conflict
      - id: check-yaml
      - id: check-json
      - id: check-toml
      - id: detect-private-key
      - id: check-added-large-files
        args: [--maxkb=1024]

  - repo: local
    hooks:
      - id: go-fmt
        name: go fmt
        language: system
        entry: gofmt -l -w
        types: [go]
        pass_filenames: true

      - id: go-vet
        name: go vet
        language: system
        entry: go vet ./...
        types: [go]
        pass_filenames: false

      - id: go-build
        name: go build
        language: system
        entry: go build ./...
        types: [go]
        pass_filenames: false

      - id: go-test
        name: go test
        language: system
        entry: go test ./...
        types: [go]
        pass_filenames: false

      - id: golangci-lint
        name: golangci-lint
        language: system
        entry: golangci-lint run
        types: [go]
        pass_filenames: false
